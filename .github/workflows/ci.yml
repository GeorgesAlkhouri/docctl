name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-static-analysis:
    name: Lint and static analysis (Python 3.13)
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies from lockfile
        run: uv sync --frozen --dev

      - name: Run Ruff lint checks
        run: make SHELL=/bin/bash lint

      - name: Run Ruff format checks
        run: make SHELL=/bin/bash format-check

      - name: Run mypy type checks
        run: make SHELL=/bin/bash typecheck

      - name: Run Bandit security checks
        run: make SHELL=/bin/bash security-lint

      - name: Run import-linter architecture checks
        run: make SHELL=/bin/bash import-lint

  test:
    name: Test suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.13'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies from lockfile
        run: uv sync --frozen --dev

      - name: Run pytest with coverage
        run: make SHELL=/bin/bash test-cov

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-3.13
          path: coverage.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13' && secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: pytest
          name: pytest-coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  sonar-analysis:
    name: Sonar quality gate
    runs-on: ubuntu-24.04
    needs:
      - test
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml-3.13

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: georgesalkhouri
          SONAR_PROJECT_KEY: GeorgesAlkhouri_docctl
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.qualitygate.wait=true

  markdown-link-check:
    name: Markdown link checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run lychee (official action)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --include-fragments -- ./**/*.md
          fail: true
