name: Publish PyPI

on:
  release:
    types:
      - published

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies from lockfile
        run: uv sync --frozen --dev

      - name: Build distributions
        run: make SHELL=/bin/bash build-dist

      - name: Verify distributions
        run: make SHELL=/bin/bash check-dist

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ github.event.release.tag_name }}
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs:
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: testpypi
      url: https://test.pypi.org/project/docctl/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ github.event.release.tag_name }}
          path: dist/

      - name: Publish to TestPyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    if: ${{ !github.event.release.prerelease }}
    needs:
      - publish-testpypi
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/docctl/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ github.event.release.tag_name }}
          path: dist/

      - name: Publish to PyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
