name: Trivy Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: trivy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Trivy report (SARIF + JSON)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.5
        with:
          version: v0.69.3
          cache: true

      - name: Run Trivy SARIF report
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          trivyignores: .trivyignore.yaml
          format: sarif
          output: trivy-results.sarif
          limit-severities-for-sarif: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Run Trivy JSON report
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          trivyignores: .trivyignore.yaml
          format: json
          output: trivy-results.json
          exit-code: 0
          skip-setup-trivy: true

      - name: Upload Trivy reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports-${{ github.run_id }}
          path: |
            trivy-results.sarif
            trivy-results.json
          if-no-files-found: error
          retention-days: 30

  upload-sarif:
    name: Upload SARIF to GitHub Security
    needs:
      - scan
    if: ${{ always() && needs.scan.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Download Trivy SARIF artifact
        uses: actions/download-artifact@v8
        with:
          name: trivy-reports-${{ github.run_id }}

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  gate-main:
    name: Trivy gate (main only)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.5
        with:
          version: v0.69.3
          cache: true

      - name: Fail on HIGH/CRITICAL findings
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          trivyignores: .trivyignore.yaml
          format: table
          exit-code: 1
          skip-setup-trivy: true
