name: Dependabot Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    name: Enable auto-merge for low-risk Dependabot PRs
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect repository auto-merge support
        id: repo_settings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "allow_auto_merge=$(gh api repos/${GITHUB_REPOSITORY} --jq '.allow_auto_merge')" >> "$GITHUB_OUTPUT"

      - name: Skip auto-merge when repository setting is disabled
        if: steps.repo_settings.outputs.allow_auto_merge != 'true'
        run: echo "Repository auto-merge is disabled; skipping merge enablement."

      - name: Enable auto-merge for patch GitHub Actions updates
        if: >
          steps.repo_settings.outputs.allow_auto_merge == 'true' &&
          steps.metadata.outputs.package-ecosystem == 'github_actions' &&
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Enable auto-merge for patch development dependency updates
        if: >
          steps.repo_settings.outputs.allow_auto_merge == 'true' &&
          steps.metadata.outputs.package-ecosystem == 'uv' &&
          steps.metadata.outputs.update-type == 'version-update:semver-patch' &&
          steps.metadata.outputs.dependency-type == 'direct:development'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
