timeout: 10m0s

ignorefile: ".trivyignore.yaml"

severity:
  - HIGH
  - CRITICAL

scan:
  scanners:
    - vuln
    - secret
  skip-dirs:
    - .git
    - .venv
    - .mypy_cache
    - .pytest_cache
    - .ruff_cache
    - .import_linter_cache
  skip-files:
    - coverage.xml

vulnerability:
  ignore-unfixed: true
